<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      No static <title>/description/OG/Twitter tags here on purpose: every real
      route is prerendered by scripts/prerender.mjs after `npm run build`, which
      bakes in the correct per-page tags via react-helmet-async. A static <title>
      here would sit alongside (not replace) the one Helmet injects, since Helmet
      only manages tags it created itself. src/components/shared/Seo.jsx sets a
      default title/description via useEffect for the rare unmatched/dev-only
      route that isn't prerendered.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
