name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -euo pipefail

            cd ~/liefroo

            git fetch origin main
            git reset --hard origin/main

            cd frontend
            # EC2 doesn't have `unzip` (or Chrome's runtime libs), so puppeteer's
            # postinstall Chromium download fails and takes down the whole
            # deploy. Skip it here — scripts/prerender.mjs already falls back
            # to a plain (non-prerendered) build when it can't launch a browser.
            PUPPETEER_SKIP_DOWNLOAD=true npm install
            npm run build

            test -f dist/index.html

            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            cd ../backend
            npm install
            pm2 restart liefroo-backend